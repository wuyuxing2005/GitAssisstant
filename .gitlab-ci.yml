stages:
  - ci
  - build
  - deploy

variables:
  REGISTRY: reg.nju.edu.cn/2026seiii/2026seiii-045-1145

# ============================================
# 后端 CI — Python 语法编译检查
# ============================================
backend-ci:
  stage: ci
  image: python:3.11
  script:
    - cd iteration2_task2
    - chmod +x ci/backend_ci.sh && ./ci/backend_ci.sh
  cache:
    key: pip-cache
    paths:
      - ~/.cache/pip
  rules:
    - changes:
        - iteration2_task2/backend/**/*
        - iteration2_task2/ci/backend_ci.sh
        - .gitlab-ci.yml

# ============================================
# 前端 CI — TypeScript 类型检查 + Vite 构建
# ============================================
frontend-ci:
  stage: ci
  image: node:20
  script:
    - cd iteration2_task2
    - chmod +x ci/frontend_ci.sh && ./ci/frontend_ci.sh
  cache:
    key: npm-cache
    paths:
      - ~/.npm
  rules:
    - changes:
        - iteration2_task2/frontend/**/*
        - iteration2_task2/ci/frontend_ci.sh
        - .gitlab-ci.yml

# ============================================
# 构建 Docker 镜像并推送到 NJU GitLab Registry
# ============================================
build-images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login reg.nju.edu.cn -u "$REGISTRY_USER" --password-stdin
  script:
    - cd iteration2_task2
    - |
      docker build \
        -t "$REGISTRY/backend:$CI_COMMIT_SHORT_SHA" \
        -t "$REGISTRY/backend:latest" \
        ./backend
    - |
      docker build \
        -t "$REGISTRY/frontend:$CI_COMMIT_SHORT_SHA" \
        -t "$REGISTRY/frontend:latest" \
        ./frontend
    - docker push "$REGISTRY/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$REGISTRY/backend:latest"
    - docker push "$REGISTRY/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$REGISTRY/frontend:latest"
  rules:
    - changes:
        - iteration2_task2/**/*

# ============================================
# CD — 部署到阿里云服务器（手动触发）
# ============================================
deploy:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client sshpass
    - mkdir -p ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - sshpass -p "$SSH_PASSWORD" ssh "$SSH_USER@$SSH_HOST" "bash -s" < iteration2_task2/ci/deploy.sh
  when: manual
  rules:
    - changes:
        - iteration2_task2/**/*
