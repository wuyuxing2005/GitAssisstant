stages:
  - ci
  - deploy

# ============================================
# 后端 CI — Python 语法编译检查
# ============================================
backend-ci:
  stage: ci
  image: python:3.11
  script:
    - cd iteration2_task2
    - chmod +x ci/backend_ci.sh && ./ci/backend_ci.sh
  rules:
    - changes:
        - iteration2_task2/backend/**/*
        - iteration2_task2/ci/backend_ci.sh
        - .gitlab-ci.yml

# ============================================
# 前端 CI — TypeScript 类型检查 + Vite 构建
# ============================================
frontend-ci:
  stage: ci
  image: node:20
  script:
    - cd iteration2_task2
    - chmod +x ci/frontend_ci.sh && ./ci/frontend_ci.sh
  cache:
    key: npm-cache
    paths:
      - ~/.npm
  rules:
    - changes:
        - iteration2_task2/frontend/**/*
        - iteration2_task2/ci/frontend_ci.sh
        - .gitlab-ci.yml

# ============================================
# CD — 部署到阿里云服务器（手动触发）
# 在服务器上拉代码 → 打镜像 → 启动
# ============================================
deploy:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client sshpass
    - mkdir -p ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - sshpass -p "$SSH_PASSWORD" ssh "$SSH_USER@$SSH_HOST" "bash -s" < iteration2_task2/ci/deploy.sh
  when: manual
  rules:
    - changes:
        - iteration2_task2/**/*
